<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" ></script>
</head>
    <body class="bg-light">
        <div class="container py-5">
            <h2 class="text-center mb-4">Students Cards</h2>
            <input type="text" id="search" class="form-control mb-4" placeholder="Search Student">
            <div id="container" class="row g-4"></div>
            <div id="json" ></div>
        </div>

        <script>
            const students = [
                { name: "Abhishek", branch: "AI", cgpa: 8.62 },
                { name: "Anurag", branch: "AI", cgpa: 8.55 },
                { name: "Aarish", branch: "AI", cgpa: 9.5 },
                { name: "Ankit", branch: "AI", cgpa: 8.12 },
                { name: "Akshat", branch: "AI", cgpa: 8.75 },
                { name: "Aman", branch: "EE", cgpa: 8.32 },
                { name: "Amit", branch: "CSE", cgpa: 8.90 },
                { name: "Arjun", branch: "ME", cgpa: 8.20 },
                { name: "Aditya", branch: "CSE", cgpa: 8.80 },
                { name: "Aayush", branch: "EE", cgpa: 8.40 }
            ];

            let html = "";
            for (let i = 0; i < students.length; i++) {
                html += `
                    <div class="col-md-4 card-item">
                        <div class="card shadow">
                            <div class="card-body">
                                <h4>${students[i].name}</h4>
                                <button class="btn btn-primary btn-sm mt-2" >
                                    Show Details
                                </button>

                                <div class="details mt-3" style="display: none;">
                                    <p><strong>Branch:</strong> ${students[i].branch}</p>
                                    <p><strong>CGPA:</strong> ${students[i].cgpa}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            document.getElementById("container").innerHTML = html;

            // Show/Hide details on button click
            $(document).on("click", ".btn", function() {
                $(this).siblings(".details").slideToggle();
            });

            // Search Students
            $("#search").keyup(function() {
                let val = $(this).val().toLowerCase();
                $(".card-item").each(function() {
                    let name = $(this).find("h4").text().toLowerCase();
                    if (name.includes(val)) {
                        $(this).show();
                    } else {
                        $(this).hide();
                    }
                });
            });
            document.getElementById("json").innerHTML = JSON.stringify(students,replace, 4);

            function replace (key, value) {
            if (key=="cgpa")
                return undefined;
            return value;
        }
        </script>
    </body>
</html>
