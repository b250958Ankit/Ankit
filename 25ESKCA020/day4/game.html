<!DOCTYPE html>
<html>
<head>
    <title>Fruit Game</title>

    <style>
        body{
            background-color: rgb(255, 255, 255);
            font-family: Arial;
        }

        h1{
            text-align: center;
        }

        #score{
            text-align: center;
            font-size: 25px;
            margin-bottom: 20px;
        }

        #game{
            position: relative;
            width: 100%;
            height: 500px;
        }

        #apple{
            position: absolute;
            font-size: 150px;
            cursor: pointer;
        }

        #banana{
            position: absolute;
            font-size: 150px;
            cursor: pointer;
        }
    </style>

</head>

<body>

<h1>Fruit Click Game</h1>

<div id="score">
    🍎 Apple : <span id="appleScore">0</span>
    &nbsp;&nbsp;&nbsp;&nbsp;
    🍌 Banana : <span id="bananaScore">0</span>
</div>

<div id="game">

    <div id="apple">🍎</div>

    <div id="banana">🍌</div>

</div>

<script>

var apple = document.getElementById("apple");
var banana = document.getElementById("banana");

var appleScore = 0;
var bananaScore = 0;

apple.style.left = "100px";
apple.style.top = "100px";

banana.style.left = "300px";
banana.style.top = "200px";

apple.onclick = function(){

    appleScore++;

    document.getElementById("appleScore").innerHTML = appleScore;

    var x = Math.floor(Math.random()*900);
    var y = Math.floor(Math.random()*400);

    apple.style.left = x + "px";
    apple.style.top = y + "px";

}

banana.onclick = function(){

    bananaScore++;

    document.getElementById("bananaScore").innerHTML = bananaScore;

    var x = Math.floor(Math.random()*900);
    var y = Math.floor(Math.random()*400);

    banana.style.left = x + "px";
    banana.style.top = y + "px";

}

</script>

</body>
</html>
